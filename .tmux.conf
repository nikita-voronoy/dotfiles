# tmux configuration

# Основные настройки
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on
set -g history-limit 10000

# Изменение префикса на Ctrl+Space
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Настройки клавиш в стиле vim
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Разделение окон
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Перезагрузка конфигурации
bind r source-file ~/.tmux.conf \; display "Конфигурация перезагружена!"

# Настройки статусной строки в стиле Catppuccin
set -g status-position top
set -g status-justify left
set -g status-style bg=default
set -g status-left-length 90
set -g status-right-length 90
set -g status-left "#[fg=#a6e3a1,bg=default,bold] #S "
set -g status-right "#[fg=#f9e2af,bg=default] %H:%M:%S #[fg=#94e2d5] %d-%b-%y "
setw -g window-status-current-format "#[fg=#f5c2e7,bg=default] #I #W "
setw -g window-status-format "#[fg=#6c7086,bg=default] #I #W "

# Цвета панелей
set -g pane-border-style fg="#313244"
set -g pane-active-border-style fg="#a6e3a1"

# Включение поддержки системного буфера обмена
set -g set-clipboard on

# Увеличение времени отображения сообщений tmux
set -g display-time 4000

# Плагины (требуется Tmux Plugin Manager)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# Инициализация TMUX plugin manager (держите эту строку в самом конце файла)
run '~/.tmux/plugins/tpm/tpm'
